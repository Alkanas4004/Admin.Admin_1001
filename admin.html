<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>لوحة تحكم المعلم - تمام</title>
    <!-- Firebase SDK (يتم تحميله أولاً) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Cairo', system-ui, sans-serif;
        }
        body {
            background: #f5f7fb;
            transition: background 0.3s;
            padding: 20px;
        }
        body.dark {
            background: #121212;
            color: #e0e0e0;
        }
        /* Login screen */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 2000;
        }
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        body.dark .login-card {
            background: #1e1e2f;
            color: white;
        }
        .login-card input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 50px;
        }
        .login-card button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
        }
        /* Main app */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            display: none;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        body.dark .header {
            background: #1e1e2f;
        }
        .logo h2 {
            color: #667eea;
        }
        .theme-toggle, .logout-btn {
            background: #667eea20;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 40px;
            margin-right: 5px;
        }
        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            flex: 1;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }
        body.dark .stat-card {
            background: #1e1e2f;
        }
        .section {
            background: white;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 30px;
        }
        body.dark .section {
            background: #1e1e2f;
        }
        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
            border-right: 5px solid #667eea;
            padding-right: 15px;
        }
        .add-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .item-card {
            background: #f9f9f9;
            padding: 12px 18px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        body.dark .item-card {
            background: #2c2c3a;
        }
        .item-actions button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            margin: 0 5px;
        }
        .edit-btn { color: #ffc107; }
        .delete-btn { color: #dc3545; }
        select, input {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid #ccc;
            margin: 5px 0 15px 0;
        }
        body.dark select, body.dark input {
            background: #2c2c3a;
            color: white;
            border-color: #555;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 500px;
        }
        body.dark .modal-content {
            background: #1e1e2f;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .save-btn, .cancel-btn {
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .save-btn { background: #28a745; color: white; }
        .cancel-btn { background: #6c757d; color: white; }
        @media (max-width: 700px) {
            .header { flex-direction: column; gap: 10px; }
            .item-card { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="login-container" id="loginContainer">
    <div class="login-card">
        <h2>🔐 لوحة المعلم</h2>
        <input type="password" id="adminPassword" placeholder="كلمة المرور">
        <button id="loginBtn">دخول</button>
        <p style="margin-top: 15px;">كلمة المرور: <strong>admin123</strong></p>
    </div>
</div>

<div class="app-container" id="appContainer">
    <div class="header">
        <div class="logo"><h2>📚 إدارة المنصة - تمَّام</h2></div>
        <div>
            <button class="theme-toggle" id="themeToggle">🌙</button>
            <button class="logout-btn" id="logoutBtn">🚪 خروج</button>
        </div>
    </div>
    <div class="stats" id="stats"></div>

    <!-- الصفوف -->
    <div class="section">
        <div style="display: flex; justify-content: space-between;">
            <h3 class="section-title">🎓 الصفوف الدراسية</h3>
            <button class="add-btn" id="addGradeBtn">+ إضافة صف</button>
        </div>
        <div id="gradesList" class="item-list"></div>
    </div>

    <!-- المواد (مرتبطة بصف) -->
    <div class="section">
        <div style="display: flex; justify-content: space-between;">
            <h3 class="section-title">📖 المواد</h3>
            <button class="add-btn" id="addSubjectBtn">+ إضافة مادة</button>
        </div>
        <label>اختر الصف لعرض مواده:</label>
        <select id="gradeFilterForSubjects"></select>
        <div id="subjectsList" class="item-list"></div>
    </div>

    <!-- الفصول (مرتبطة بمادة) -->
    <div class="section">
        <div style="display: flex; justify-content: space-between;">
            <h3 class="section-title">📂 الفصول</h3>
            <button class="add-btn" id="addChapterBtn">+ إضافة فصل</button>
        </div>
        <label>اختر المادة:</label>
        <select id="subjectFilterForChapters"></select>
        <div id="chaptersList" class="item-list"></div>
    </div>

    <!-- المحاضرات (مرتبطة بفصل) -->
    <div class="section">
        <div style="display: flex; justify-content: space-between;">
            <h3 class="section-title">🎥 المحاضرات</h3>
            <button class="add-btn" id="addLectureBtn">+ إضافة محاضرة</button>
        </div>
        <label>اختر الفصل:</label>
        <select id="chapterFilterForLectures"></select>
        <div id="lecturesList" class="item-list"></div>
    </div>
</div>

<!-- Modal عام -->
<div id="genericModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">إضافة</h3>
        <div id="modalFields"></div>
        <div class="modal-actions">
            <button class="cancel-btn" id="modalCancel">إلغاء</button>
            <button class="save-btn" id="modalSave">حفظ</button>
        </div>
    </div>
</div>

<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyAFrf9kRQez8ltkvd66_BQZPmARc1fW6y8",
        authDomain: "date-student.firebaseapp.com",
        databaseURL: "https://date-student-default-rtdb.firebaseio.com",
        projectId: "date-student",
        storageBucket: "date-student.firebasestorage.app",
        messagingSenderId: "952213529741",
        appId: "1:952213529741:web:7a8d8da275214b5754eec4",
        measurementId: "G-CNR9HYEGGF"
    };
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Global state
    let currentModalType = null; // 'grade', 'subject', 'chapter', 'lecture'
    let currentEditId = null;

    // DOM elements
    const loginContainer = document.getElementById('loginContainer');
    const appContainer = document.getElementById('appContainer');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const themeToggle = document.getElementById('themeToggle');
    const addGradeBtn = document.getElementById('addGradeBtn');
    const addSubjectBtn = document.getElementById('addSubjectBtn');
    const addChapterBtn = document.getElementById('addChapterBtn');
    const addLectureBtn = document.getElementById('addLectureBtn');
    const gradeFilter = document.getElementById('gradeFilterForSubjects');
    const subjectFilter = document.getElementById('subjectFilterForChapters');
    const chapterFilter = document.getElementById('chapterFilterForLectures');
    const modal = document.getElementById('genericModal');
    const modalCancel = document.getElementById('modalCancel');
    const modalSave = document.getElementById('modalSave');

    // Helper: load all data and update views
    function loadAll() {
        loadGrades();
        loadSubjectsByGrade();
        loadChaptersBySubject();
        loadLecturesByChapter();
        updateStats();
    }

    // ---------- Grades ----------
    function loadGrades() {
        db.ref('grades').on('value', (snap) => {
            const grades = snap.val() || {};
            const container = document.getElementById('gradesList');
            container.innerHTML = '';
            // تحديث فلتر المواد
            gradeFilter.innerHTML = '<option value="">-- اختر الصف --</option>';
            for (let id in grades) {
                const g = grades[id];
                container.innerHTML += `
                    <div class="item-card">
                        <span><strong>${g.name}</strong> (ترتيب: ${g.order || 0})</span>
                        <div class="item-actions">
                            <button class="edit-btn" onclick="editGrade('${id}', '${g.name.replace(/'/g, "\\'")}', ${g.order || 0})"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn" onclick="deleteGrade('${id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
                gradeFilter.innerHTML += `<option value="${id}">${g.name}</option>`;
            }
            loadSubjectsByGrade(); // refresh subjects if grade filter changed
        });
    }

    window.editGrade = (id, name, order) => {
        currentModalType = 'grade';
        currentEditId = id;
        document.getElementById('modalTitle').innerText = 'تعديل صف';
        document.getElementById('modalFields').innerHTML = `
            <label>اسم الصف</label><input id="gradeName" value="${name}">
            <label>ترتيب العرض</label><input id="gradeOrder" type="number" value="${order}">
        `;
        modal.style.display = 'flex';
    };

    window.deleteGrade = (id) => {
        if (confirm('حذف الصف سيحذف كل المواد والفصول والمحاضرات المرتبطة. استمرار؟')) {
            db.ref('grades/' + id).remove();
            // حذف المواد التي تتبع هذا الصف
            db.ref('subjects').orderByChild('gradeId').equalTo(id).once('value', (snap) => {
                snap.forEach((sub) => {
                    db.ref('subjects/' + sub.key).remove();
                });
            });
        }
    };

    // ---------- Subjects ----------
    function loadSubjectsByGrade() {
        const gradeId = gradeFilter.value;
        if (!gradeId) {
            document.getElementById('subjectsList').innerHTML = '<div class="item-card">اختر صفاً أولاً</div>';
            return;
        }
        db.ref('subjects').orderByChild('gradeId').equalTo(gradeId).on('value', (snap) => {
            const subs = snap.val() || {};
            const container = document.getElementById('subjectsList');
            container.innerHTML = '';
            // تحديث فلتر المواد للفصول
            subjectFilter.innerHTML = '<option value="">-- اختر مادة --</option>';
            for (let id in subs) {
                const s = subs[id];
                container.innerHTML += `
                    <div class="item-card">
                        <span><strong>${s.name}</strong></span>
                        <div class="item-actions">
                            <button class="edit-btn" onclick="editSubject('${id}', '${s.name.replace(/'/g, "\\'")}', '${gradeId}')"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn" onclick="deleteSubject('${id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
                subjectFilter.innerHTML += `<option value="${id}">${s.name}</option>`;
            }
            loadChaptersBySubject(); // refresh chapters
        });
    }

    window.editSubject = (id, name, gradeId) => {
        currentModalType = 'subject';
        currentEditId = id;
        // نعيد تحميل خيارات الصفوف ديناميكياً
        db.ref('grades').once('value', (snap) => {
            let opts = '';
            snap.forEach((g) => {
                const selected = (g.key === gradeId) ? 'selected' : '';
                opts += `<option value="${g.key}" ${selected}>${g.val().name}</option>`;
            });
            document.getElementById('modalFields').innerHTML = `
                <label>اسم المادة</label><input id="subjectName" value="${name}">
                <label>الصف</label><select id="subjectGradeId">${opts}</select>
            `;
            modal.style.display = 'flex';
        });
    };

    window.deleteSubject = (id) => {
        if (confirm('حذف المادة سيحذف كل الفصول والمحاضرات المرتبطة بها')) {
            db.ref('subjects/' + id).remove();
            db.ref('chapters').orderByChild('subjectId').equalTo(id).once('value', (snap) => {
                snap.forEach((ch) => {
                    db.ref('chapters/' + ch.key).remove();
                });
            });
        }
    };

    // ---------- Chapters ----------
    function loadChaptersBySubject() {
        const subjectId = subjectFilter.value;
        if (!subjectId) {
            document.getElementById('chaptersList').innerHTML = '<div class="item-card">اختر مادة أولاً</div>';
            return;
        }
        db.ref('chapters').orderByChild('subjectId').equalTo(subjectId).on('value', (snap) => {
            const chapters = snap.val() || {};
            const container = document.getElementById('chaptersList');
            container.innerHTML = '';
            chapterFilter.innerHTML = '<option value="">-- اختر فصل --</option>';
            for (let id in chapters) {
                const c = chapters[id];
                container.innerHTML += `
                    <div class="item-card">
                        <span><strong>${c.name}</strong></span>
                        <div class="item-actions">
                            <button class="edit-btn" onclick="editChapter('${id}', '${c.name.replace(/'/g, "\\'")}', '${subjectId}')"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn" onclick="deleteChapter('${id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
                chapterFilter.innerHTML += `<option value="${id}">${c.name}</option>`;
            }
            loadLecturesByChapter();
        });
    }

    window.editChapter = (id, name, subjectId) => {
        currentModalType = 'chapter';
        currentEditId = id;
        db.ref('subjects').once('value', (snap) => {
            let opts = '';
            snap.forEach((s) => {
                const selected = (s.key === subjectId) ? 'selected' : '';
                opts += `<option value="${s.key}" ${selected}>${s.val().name}</option>`;
            });
            document.getElementById('modalFields').innerHTML = `
                <label>اسم الفصل</label><input id="chapterName" value="${name}">
                <label>المادة</label><select id="chapterSubjectId">${opts}</select>
            `;
            modal.style.display = 'flex';
        });
    };

    window.deleteChapter = (id) => {
        if (confirm('حذف الفصل سيحذف كل المحاضرات المرتبطة به')) {
            db.ref('chapters/' + id).remove();
            db.ref('lectures').orderByChild('chapterId').equalTo(id).once('value', (snap) => {
                snap.forEach((lec) => {
                    db.ref('lectures/' + lec.key).remove();
                });
            });
        }
    };

    // ---------- Lectures ----------
    function loadLecturesByChapter() {
        const chapterId = chapterFilter.value;
        if (!chapterId) {
            document.getElementById('lecturesList').innerHTML = '<div class="item-card">اختر فصلاً أولاً</div>';
            return;
        }
        db.ref('lectures').orderByChild('chapterId').equalTo(chapterId).on('value', (snap) => {
            const lectures = snap.val() || {};
            const container = document.getElementById('lecturesList');
            container.innerHTML = '';
            for (let id in lectures) {
                const lec = lectures[id];
                container.innerHTML += `
                    <div class="item-card">
                        <span><strong>${lec.name}</strong><br><small>${lec.videoUrl}</small></span>
                        <div class="item-actions">
                            <button class="edit-btn" onclick="editLecture('${id}', '${lec.name.replace(/'/g, "\\'")}', '${lec.videoUrl.replace(/'/g, "\\'")}', '${chapterId}')"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn" onclick="deleteLecture('${id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            }
        });
    }

    window.editLecture = (id, name, url, chapterId) => {
        currentModalType = 'lecture';
        currentEditId = id;
        db.ref('chapters').once('value', (snap) => {
            let opts = '';
            snap.forEach((c) => {
                const selected = (c.key === chapterId) ? 'selected' : '';
                opts += `<option value="${c.key}" ${selected}>${c.val().name}</option>`;
            });
            document.getElementById('modalFields').innerHTML = `
                <label>اسم المحاضرة</label><input id="lectureName" value="${name}">
                <label>رابط الفيديو</label><input id="lectureUrl" value="${url}">
                <label>الفصل</label><select id="lectureChapterId">${opts}</select>
            `;
            modal.style.display = 'flex';
        });
    };

    window.deleteLecture = (id) => {
        if (confirm('حذف المحاضرة نهائياً؟')) {
            db.ref('lectures/' + id).remove();
        }
    };

    // Save modal data
    modalSave.onclick = async () => {
        if (currentModalType === 'grade') {
            const name = document.getElementById('gradeName')?.value;
            const order = parseInt(document.getElementById('gradeOrder')?.value) || 0;
            if (!name) { alert('أدخل اسم الصف'); return; }
            if (currentEditId) {
                await db.ref('grades/' + currentEditId).update({ name, order });
            } else {
                await db.ref('grades').push({ name, order });
            }
        } 
        else if (currentModalType === 'subject') {
            const name = document.getElementById('subjectName')?.value;
            const gradeId = document.getElementById('subjectGradeId')?.value;
            if (!name || !gradeId) { alert('أدخل اسم المادة واختر الصف'); return; }
            if (currentEditId) {
                await db.ref('subjects/' + currentEditId).update({ name, gradeId });
            } else {
                await db.ref('subjects').push({ name, gradeId });
            }
        }
        else if (currentModalType === 'chapter') {
            const name = document.getElementById('chapterName')?.value;
            const subjectId = document.getElementById('chapterSubjectId')?.value;
            if (!name || !subjectId) { alert('أدخل اسم الفصل واختر المادة'); return; }
            if (currentEditId) {
                await db.ref('chapters/' + currentEditId).update({ name, subjectId });
            } else {
                await db.ref('chapters').push({ name, subjectId });
            }
        }
        else if (currentModalType === 'lecture') {
            const name = document.getElementById('lectureName')?.value;
            const videoUrl = document.getElementById('lectureUrl')?.value;
            const chapterId = document.getElementById('lectureChapterId')?.value;
            if (!name || !videoUrl || !chapterId) { alert('أكمل جميع الحقول'); return; }
            if (currentEditId) {
                await db.ref('lectures/' + currentEditId).update({ name, videoUrl, chapterId });
            } else {
                await db.ref('lectures').push({ name, videoUrl, chapterId });
            }
        }
        modal.style.display = 'none';
        loadAll(); // refresh all
    };

    modalCancel.onclick = () => {
        modal.style.display = 'none';
        currentEditId = null;
    };

    // إضافة جديدة من الأزرار
    addGradeBtn.onclick = () => {
        currentModalType = 'grade';
        currentEditId = null;
        document.getElementById('modalTitle').innerText = 'إضافة صف جديد';
        document.getElementById('modalFields').innerHTML = `
            <label>اسم الصف</label><input id="gradeName">
            <label>ترتيب العرض</label><input id="gradeOrder" type="number" value="0">
        `;
        modal.style.display = 'flex';
    };
    addSubjectBtn.onclick = () => {
        currentModalType = 'subject';
        currentEditId = null;
        document.getElementById('modalTitle').innerText = 'إضافة مادة جديدة';
        db.ref('grades').once('value', (snap) => {
            let opts = '<option value="">-- اختر الصف --</option>';
            snap.forEach((g) => opts += `<option value="${g.key}">${g.val().name}</option>`);
            document.getElementById('modalFields').innerHTML = `
                <label>اسم المادة</label><input id="subjectName">
                <label>الصف</label><select id="subjectGradeId">${opts}</select>
            `;
            modal.style.display = 'flex';
        });
    };
    addChapterBtn.onclick = () => {
        currentModalType = 'chapter';
        currentEditId = null;
        document.getElementById('modalTitle').innerText = 'إضافة فصل جديد';
        db.ref('subjects').once('value', (snap) => {
            let opts = '<option value="">-- اختر المادة --</option>';
            snap.forEach((s) => opts += `<option value="${s.key}">${s.val().name}</option>`);
            document.getElementById('modalFields').innerHTML = `
                <label>اسم الفصل</label><input id="chapterName">
                <label>المادة</label><select id="chapterSubjectId">${opts}</select>
            `;
            modal.style.display = 'flex';
        });
    };
    addLectureBtn.onclick = () => {
        currentModalType = 'lecture';
        currentEditId = null;
        document.getElementById('modalTitle').innerText = 'إضافة محاضرة جديدة';
        db.ref('chapters').once('value', (snap) => {
            let opts = '<option value="">-- اختر الفصل --</option>';
            snap.forEach((c) => opts += `<option value="${c.key}">${c.val().name}</option>`);
            document.getElementById('modalFields').innerHTML = `
                <label>اسم المحاضرة</label><input id="lectureName">
                <label>رابط الفيديو</label><input id="lectureUrl">
                <label>الفصل</label><select id="lectureChapterId">${opts}</select>
            `;
            modal.style.display = 'flex';
        });
    };

    // تحديث الإحصائيات
    async function updateStats() {
        const grades = await db.ref('grades').once('value');
        const subjects = await db.ref('subjects').once('value');
        const chapters = await db.ref('chapters').once('value');
        const lectures = await db.ref('lectures').once('value');
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><i class="fas fa-graduation-cap"></i><h3>${grades.numChildren()}</h3><p>الصفوف</p></div>
            <div class="stat-card"><i class="fas fa-book"></i><h3>${subjects.numChildren()}</h3><p>المواد</p></div>
            <div class="stat-card"><i class="fas fa-folder"></i><h3>${chapters.numChildren()}</h3><p>الفصول</p></div>
            <div class="stat-card"><i class="fas fa-video"></i><h3>${lectures.numChildren()}</h3><p>المحاضرات</p></div>
        `;
    }

    // أحداث الفلاتر
    gradeFilter.addEventListener('change', () => loadSubjectsByGrade());
    subjectFilter.addEventListener('change', () => loadChaptersBySubject());
    chapterFilter.addEventListener('change', () => loadLecturesByChapter());

    // تسجيل الدخول
    loginBtn.onclick = () => {
        const pwd = document.getElementById('adminPassword').value;
        if (pwd === 'admin123') {
            loginContainer.style.display = 'none';
            appContainer.style.display = 'block';
            loadAll();
        } else {
            alert('كلمة المرور غير صحيحة');
        }
    };
    logoutBtn.onclick = () => {
        loginContainer.style.display = 'flex';
        appContainer.style.display = 'none';
        document.getElementById('adminPassword').value = '';
    };

    // الوضع الليلي
    if (localStorage.getItem('darkMode') === 'enabled') {
        document.body.classList.add('dark');
        themeToggle.innerHTML = '☀️';
    }
    themeToggle.onclick = () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
        themeToggle.innerHTML = isDark ? '☀️' : '🌙';
    };
</script>
</body>
</html>
